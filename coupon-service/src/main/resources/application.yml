spring:
  application:
    name: coupon-service

#  profiles:
#    active: ${SPRING_PROFILES_ACTIVE}

  cloud:
    stream:
      bindings:
        payment-out-0:
          destination: payment-events
    config:
      import-check:
        enabled: false
#    discovery:
#      enabled: true
#    config:
#      uri: ${CONFIG_SERVER_URL}

  config:
    import-check:
      enabled: false
#    import: configserver:${CONFIG_SERVER_URL}

#  datasource:
#    primary:
#      url: jdbc:postgresql://localhost:5432/coupon_db
#      username: maciejwnuklipinski
#      password: pswd
#      hikari:
#        maximum-pool-size: 10

#  jpa:
#    hibernate:
#      ddl-auto: validate

  datasource:
    url: jdbc:h2:mem:coupondb # Na start H2 (w pamięci), łatwe do sprawdzenia
    driverClassName: org.h2.Driver
    username: sa
    password: password
    jpa:
      hibernate:
        ddl-auto: create-drop
      show-sql: true
      defer-datasource-initialization: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

resilience4j:
  retry:
    instances:
      geoip:
        maxAttempts: 3
        waitDuration: 1s

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true