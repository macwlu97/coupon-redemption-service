spring:
  # 1. Disable Config Server and override the import from application.yml
  cloud:
    config:
      enabled: false
  config:
    import: "" # This MUST be empty to stop searching for config-server
    import-check:
      enabled: false

  # 2. Database for tests
  datasource:
    url: jdbc:h2:mem:coupon_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # 3. Hibernate and JPA
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  # 4. Kafka - disable auto-startup to avoid connection errors
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

# 5. Infrastructure
eureka:
  client:
    enabled: false
  instance:
    enabled: false

# 6. Resilience4j
resilience4j:
  retry:
    instances:
      geoip:
        max-attempts: 1

server:
  port: 0