resilience4j:
  retry:
    instances:
      geoip:
        maxAttempts: 2
        waitDuration: 500ms
  circuitbreaker:
    instances:
      geoipCB:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000ms
        permittedNumberOfCallsInHalfOpenState: 3
      internalServiceCB:
        registerHealthIndicator: true      # Exposes circuit breaker status via Actuator /health endpoint
        slidingWindowSize: 10              # Number of calls to record and analyze for the threshold
        failureRateThreshold: 50           # Opens the circuit if 50% or more calls fail
        waitDurationInOpenState: 10000ms   # Time to wait before transitioning from OPEN to HALF_OPEN
        permittedNumberOfCallsInHalfOpenState: 3 # Number of test calls allowed to verify service recovery
        slowCallRateThreshold: 100         # Percentage of slow calls required to open the circuit
        slowCallDurationThreshold: 2000ms  # Maximum duration allowed before a call is considered "slow"

# Feign
feign:
  client:
    config:
      default:
        connectTimeout: 2000
        readTimeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs